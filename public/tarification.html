<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delale Paysage — Outil de tarification</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --line:#dbe3ee;
      --text:#0f172a;
      --muted:#64748b;
      --blue:#1f4d7a;
      --green:#e8f4e8;
      --soft:#f8fafc;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      background:linear-gradient(135deg,#f8fafc,#ffffff 45%,#edf7ef);
    }
    .wrap{max-width:1400px;margin:0 auto;padding:22px}
    .hero{
      display:grid;grid-template-columns:1.4fr .9fr;gap:24px;margin-bottom:24px
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:32px;
      box-shadow:var(--shadow);
    }
    .card.pad{padding:28px}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      background:#dff3e4;color:#166534;border-radius:999px;
      padding:10px 14px;font-size:14px;font-weight:700
    }
    h1{margin:18px 0 6px;font-size:46px;line-height:1.05}
    h2,h3,h4{margin:0}
    .top-right{background:var(--blue);color:#fff}
    .top-right .item{display:flex;align-items:center;gap:10px;margin:16px 0;color:#e2e8f0}
    .tabs{
      display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px
    }
    .tab-btn{
      border:1px solid var(--line);background:#fff;color:var(--text);
      border-radius:24px;padding:16px;text-align:left;cursor:pointer;
      box-shadow:0 4px 12px rgba(15,23,42,.05);min-height:88px
    }
    .tab-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .tab-btn small{display:block;color:var(--muted);margin-top:4px}
    .tab-btn.active small{color:#dbeafe}
    .tab-content{display:none}
    .tab-content.active{display:block}
    .calc .head{
      background:var(--blue);color:#fff;border-radius:30px 30px 0 0;padding:22px 24px;
      display:flex;align-items:center;justify-content:space-between;gap:16px
    }
    .calc .body{padding:24px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:22px}
    .inner{
      background:var(--soft);border:1px solid var(--line);border-radius:28px
    }
    .inner .inner-head{padding:20px 20px 0;font-size:22px;font-weight:700}
    .inner .inner-body{padding:20px}
    .field{
      display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:center;margin-bottom:14px
    }
    .field label{font-size:14px;font-weight:700;color:#334155}
    input,select,button,textarea{
      font:inherit
    }
    input,select{
      width:100%;height:46px;padding:10px 12px;border-radius:14px;border:1px solid #cbd5e1;
      background:var(--green)
    }
    .result-row{
      display:flex;justify-content:space-between;gap:12px;align-items:center;
      padding:14px 16px;border:1px solid var(--line);border-radius:16px;background:#fff;margin-bottom:10px
    }
    .result-row .l{font-size:14px;color:#475569}
    .result-row .v{font-size:14px;font-weight:700}
    .result-row.strong .l,.result-row.strong .v{font-size:16px;color:#0f172a}
    .sep{height:1px;background:var(--line);margin:12px 0}
    .btn{
      border:0;background:#fff;color:var(--text);padding:11px 16px;border-radius:16px;cursor:pointer;font-weight:700
    }
    .btn.primary{background:var(--blue);color:#fff}
    .btn.ghost{background:#fff}
    .btn.dark{background:#0f172a;color:#fff}
    .section-title{
      margin-bottom:14px;padding:18px 22px;background:#fff;border:1px solid var(--line);
      border-radius:24px;font-size:24px;font-weight:800
    }
    .param-grid{display:grid;grid-template-columns:.85fr 1.15fr;gap:20px}
    .param-col .card{padding:18px}
    .param-right .big{padding:18px}
    .param-groups{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .group-card{
      border:1px solid var(--line);border-radius:24px;background:#fff;padding:16px
    }
    .group-card h4{margin-bottom:12px}
    .quick-line,.edit-line{
      display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;
      border:1px solid var(--line);border-radius:16px;background:#f8fafc;padding:12px;margin-bottom:10px
    }
    .edit-line{grid-template-columns:1fr 110px}
    .rate-row{
      border:1px solid var(--line);border-radius:18px;background:#f8fafc;padding:12px;margin-bottom:10px
    }
    .rate-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .rate-grid.two{grid-template-columns:repeat(2,1fr)}
    .small-label{font-size:11px;text-transform:uppercase;color:#64748b;font-weight:700;margin-bottom:6px}
    .badge-list{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
    .badge{
      background:var(--blue);color:#fff;border-radius:14px;padding:10px 14px;font-size:14px;font-weight:700
    }
    .hidden{display:none!important}
    @media (max-width:1100px){
      .hero,.grid-2,.param-grid,.param-groups{grid-template-columns:1fr}
      .tabs{grid-template-columns:1fr 1fr}
    }
    @media (max-width:700px){
      h1{font-size:32px}
      .field{grid-template-columns:1fr}
      .tabs{grid-template-columns:1fr}
      .rate-grid{grid-template-columns:1fr}
    }
  </style>
</head>

<script>
const STORAGE_KEY = "delale-paysage-tarification-v2026";

  debroussaillageParams: {

    vegetation: { "Entretien léger": 0.9, Normale: 1, "Dense / herbe haute": 1.15, "Très dense / remise en état": 1.3, "Ronces légères / rejets": 1.45 },
    zones: { "1 zone simple": 1, "2 à 3 zones": 1.08, "4 zones et +": 1.16 },
    acces: { Facile: 1, Moyen: 1.05, Difficile: 1.12 },
    finition: { "Sans finition": 1, "Avec soufflage / finition": 1.08, "Coupe soignée / contours": 1.12 },

    evacuation: { Non: 1, Oui: 1 },

  },
  desherbageParams: {
    support: { "Tout-venant / stabilisé": 1, "Enrobé / béton": 1, "Pavés / joints": 1.12, "Graviers / zone meuble": 1.08, "Caniveaux / bordures / zone mixte": 1.15 },
    densite: { "Légère": 0.9, Normale: 1, Dense: 1.15, "Très dense / remise en état": 1.3 },
    acces: { Facile: 1, Moyen: 1.05, Difficile: 1.12 },
    finition: { "Sans soufflage": 1, "Avec soufflage": 1.08, "Finition soignée": 1.12 },
    frequence: { "Entretien régulier": 0.9, "2 à 3 passages / an": 0.95, Ponctuel: 1, "Remise en état": 1.15 },
    options: { "Sans anti-repousse": 0, "Avec anti-repousse": 0.2 },
    constantes: { minimum: 75, forfaitThermiqueMini: 45, deplacement: 0 },
  },
  haieParams: {
    configuration: { "1 face seule": 0.65, "2 faces": 0.9, "2 faces + dessus": 1, "Réduction légère": 1.15, "Réduction importante": 1.35 },
    densite: { "Légère / entretien": 0.92, Normale: 1, Dense: 1.1, "Très dense / difficile": 1.22, "Bois dur / mixte / vieux": 1.3 },
    largeur: { "Fine (< 0,60 m)": 0.95, Standard: 1, Large: 1.1, "Très large": 1.2 },
    acces: { Facile: 1, Moyen: 1.05, Difficile: 1.12 },
    frequence: { "Entretien régulier": 0.95, Ponctuel: 1, "Remise en état": 1.15 },
    evacuation: { Non: 1, Oui: 1 },
    constantes: { tauxEvac: 40, minimum: 95, deplacement: 0 },
  },
  forms: {
    tonte: { surface: 0, terrain: "Plat et dégagé", herbe: "Normale", zones: "1 zone", obstacles: "Faible", acces: "Facile", bordures: "Non", frequence: "Ponctuel / hors contrat", remise: "Non", evacuation: "Non", tempsEvac: 0, tauxEvac: 40, deplacement: 0, minimum: 80 },
    debroussaillage: { surface: 0, terrain: "Plat et dégagé", vegetation: "Normale", zones: "1 zone simple", acces: "Facile", finition: "Sans finition", frequence: "2 passages / an", evacuation: "Non", tempsEvac: 0, tauxEvac: 40, deplacement: 0, minimum: 90 },
    desherbage: { surface: 0, support: "Tout-venant / stabilisé", densite: "Normale", acces: "Facile", finition: "Avec soufflage", frequence: "Ponctuel", antiRepousse: "Sans anti-repousse", deplacement: 0, minimum: 75 },
    haies: { lineaire: 0, hauteur: 2, configuration: "2 faces + dessus", densite: "Normale", largeur: "Standard", acces: "Facile", frequence: "Ponctuel", evacuation: "Non", tempsEvac: 0, tauxEvac: 40, deplacement: 0, minimum: 95 },
  },
};

function deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return deepClone(defaults);
    const parsed = JSON.parse(raw);
    return mergeDeep(deepClone(defaults), parsed);
  }catch{
    return deepClone(defaults);
  }
}
function mergeDeep(target, source){
  for(const key in source){
    if(source[key] && typeof source[key] === "object" && !Array.isArray(source[key]) && target[key]){
      mergeDeep(target[key], source[key]);
    }else{
      target[key] = source[key];
    }
  }
  return target;
}
let state = loadState();
let activeTab = "tonte";

const euro = n => new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR",minimumFractionDigits:2}).format(Number.isFinite(+n)?+n:0);
const num = v => Number(v || 0);
const round2 = v => Math.round((num(v) + Number.EPSILON) * 100) / 100;
const fmt = (v,suffix="x") => `${num(v).toFixed(2).replace(".",",")}${suffix}`;

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function getSurfaceTier(value, tiers){ return tiers.reduce((acc,t)=> value >= t.min ? t : acc, tiers[0]); }
function getHeightTier(value, tiers){ return tiers.reduce((acc,t)=> value >= t.minHeight ? t : acc, tiers[0]); }

function setForm(section, patch){
  state.forms[section] = { ...state.forms[section], ...patch };
  save();
  render();
}
function resetForm(section){
  const base = deepClone(defaults.forms[section]);
  if(section==="tonte"){
    base.tauxEvac = state.tonteParams.constantes.tauxEvac;
    base.deplacement = state.tonteParams.constantes.deplacement;
    base.minimum = state.tonteParams.constantes.minimum;
  }
  if(section==="debroussaillage"){
    base.tauxEvac = state.debroussaillageParams.constantes.tauxEvac;
    base.deplacement = state.debroussaillageParams.constantes.deplacement;
    base.minimum = state.debroussaillageParams.constantes.minimum;
  }
  if(section==="desherbage"){
    base.deplacement = state.desherbageParams.constantes.deplacement;
    base.minimum = state.desherbageParams.constantes.minimum;
  }
  if(section==="haies"){
    base.tauxEvac = state.haieParams.constantes.tauxEvac;
    base.deplacement = state.haieParams.constantes.deplacement;
    base.minimum = state.haieParams.constantes.minimum;
  }
  state.forms[section] = base;
  save();
  render();
}
function updateNestedParams(section, category, label, value){
  state[section][category][label] = num(value);
  syncFormWithConstants(section);
  save();
  render();
}
function updateConstParams(section, label, value){
  state[section].constantes[label] = num(value);
  syncFormWithConstants(section);
  save();
  render();
}
function updateRateTable(key, index, field, value){
  state[key][index][field] = (field === "label") ? value : num(value);
  save();
  render();
}
function syncFormWithConstants(section){
  if(section === "tonteParams"){
    state.forms.tonte.tauxEvac = state.tonteParams.constantes.tauxEvac;
    state.forms.tonte.minimum = state.tonteParams.constantes.minimum;
  }
  if(section === "debroussaillageParams"){
    state.forms.debroussaillage.tauxEvac = state.debroussaillageParams.constantes.tauxEvac;
    state.forms.debroussaillage.minimum = state.debroussaillageParams.constantes.minimum;
  }
  if(section === "desherbageParams"){
    state.forms.desherbage.minimum = state.desherbageParams.constantes.minimum;
  }
  if(section === "haieParams"){
    state.forms.haies.tauxEvac = state.haieParams.constantes.tauxEvac;
    state.forms.haies.minimum = state.haieParams.constantes.minimum;
  }
}

function calcTonte(){
  const f = state.forms.tonte;
  const tier = getSurfaceTier(num(f.surface), state.tonteSurfaceRates);
  const c = {
    terrain: state.tonteParams.terrain[f.terrain] ?? 1,
    herbe: state.tonteParams.herbe[f.herbe] ?? 1,
    zones: state.tonteParams.zones[f.zones] ?? 1,
    obstacles: state.tonteParams.obstacles[f.obstacles] ?? 1,
    acces: state.tonteParams.acces[f.acces] ?? 1,
    bordures: state.tonteParams.bordures[f.bordures] ?? 1,
    frequence: state.tonteParams.frequence[f.frequence] ?? 1,
    remise: state.tonteParams.remise[f.remise] ?? 1,
  };
  const coeffGlobal = round2(Object.values(c).reduce((a,b)=>a*b,1));
  const baseSurface = round2(num(f.surface) * tier.rate);
  const ajustee = round2(baseSurface * coeffGlobal);
  const evac = f.evacuation === "Oui" ? round2(num(f.tempsEvac) * num(f.tauxEvac)) : 0;
  const total = Math.max(round2(ajustee + evac + num(f.deplacement)), num(f.minimum));
  return {tier,c,coeffGlobal,baseSurface,ajustee,evac,total};
}
function calcDeb(){
  const f = state.forms.debroussaillage;
  const tier = getSurfaceTier(num(f.surface), state.debroussaillageSurfaceRates);
  const c = {
    terrain: state.debroussaillageParams.terrain[f.terrain] ?? 1,
    vegetation: state.debroussaillageParams.vegetation[f.vegetation] ?? 1,
    zones: state.debroussaillageParams.zones[f.zones] ?? 1,
    acces: state.debroussaillageParams.acces[f.acces] ?? 1,
    finition: state.debroussaillageParams.finition[f.finition] ?? 1,
    frequence: state.debroussaillageParams.frequence[f.frequence] ?? 1,
  };
  const coeffGlobal = round2(Object.values(c).reduce((a,b)=>a*b,1));
  const baseSurface = round2(num(f.surface) * tier.rate);
  const ajustee = round2(baseSurface * coeffGlobal);
  const evac = f.evacuation === "Oui" ? round2(num(f.tempsEvac) * num(f.tauxEvac)) : 0;
  const total = Math.max(round2(ajustee + evac + num(f.deplacement)), num(f.minimum));
  return {tier,c,coeffGlobal,baseSurface,ajustee,evac,total};
}
function calcDesh(){
  const f = state.forms.desherbage;
  const tier = getSurfaceTier(num(f.surface), state.desherbageSurfaceRates);
  const c = {
    support: state.desherbageParams.support[f.support] ?? 1,
    densite: state.desherbageParams.densite[f.densite] ?? 1,
    acces: state.desherbageParams.acces[f.acces] ?? 1,
    finition: state.desherbageParams.finition[f.finition] ?? 1,
    frequence: state.desherbageParams.frequence[f.frequence] ?? 1,
  };
  const coeffGlobal = round2(Object.values(c).reduce((a,b)=>a*b,1));
  const baseSurface = round2(num(f.surface) * tier.rate);
  const ajustee = round2(baseSurface * coeffGlobal);
  const antiRepousse = round2(num(f.surface) * (state.desherbageParams.options[f.antiRepousse] ?? 0));
  const thermique = Math.max(ajustee, num(state.desherbageParams.constantes.forfaitThermiqueMini));
  const total = Math.max(round2(thermique + antiRepousse + num(f.deplacement)), num(f.minimum));
  return {tier,c,coeffGlobal,baseSurface,ajustee,antiRepousse,total};
}
function calcHaie(){
  const f = state.forms.haies;
  const tier = getHeightTier(num(f.hauteur), state.haieBaseRates);
  const c = {
    configuration: state.haieParams.configuration[f.configuration] ?? 1,
    densite: state.haieParams.densite[f.densite] ?? 1,
    largeur: state.haieParams.largeur[f.largeur] ?? 1,
    acces: state.haieParams.acces[f.acces] ?? 1,
    frequence: state.haieParams.frequence[f.frequence] ?? 1,
  };
  const coeffGlobal = round2(Object.values(c).reduce((a,b)=>a*b,1));
  const baseLineaire = round2(num(f.lineaire) * tier.rate);
  const ajustee = round2(baseLineaire * coeffGlobal);
  const evac = f.evacuation === "Oui" ? round2(num(f.tempsEvac) * num(f.tauxEvac)) : 0;
  const total = Math.max(round2(ajustee + evac + num(f.deplacement)), num(f.minimum));
  return {tier,c,coeffGlobal,baseLineaire,ajustee,evac,total};
}

function field(label, control){
  return `<div class="field"><label>${label}</label><div>${control}</div></div>`;
}
function inputNumber(value, onchange, step="1"){
  return `<input type="number" step="${step}" value="${value}" onchange="${onchange}(this.value)">`;
}
function selectControl(value, options, onchange){
  return `<select onchange="${onchange}(this.value)">
    ${options.map(opt=>`<option value="${escapeAttr(opt)}" ${opt===value?"selected":""}>${opt}</option>`).join("")}
  </select>`;
}
function resultRow(label, value, strong=false){
  return `<div class="result-row ${strong?"strong":""}"><div class="l">${label}</div><div class="v">${value}</div></div>`;
}
function escapeAttr(s){
  return String(s).replace(/"/g,"&quot;");
}

function renderTabs(){
  const tabs = [
    ["tonte","🌿","Tonte","Pelouses et finitions"],
    ["debroussaillage","✂️","Débroussaillage","Talus et grandes zones"],
    ["desherbage","🔥","Désherbage","Thermique et options"],
    ["haies","🌳","Haies","Tailles et réductions"],
    ["parametres","⚙️","Paramètres","Barèmes et coefficients"],
  ];
  document.getElementById("tabs").innerHTML = tabs.map(([key,icon,title,sub])=>`
    <button class="tab-btn ${activeTab===key?"active":""}" onclick="switchTab('${key}')">

function quickRatesCard(title, unit, rows){
  return `
    <div class="card">
      <h3 style="margin-bottom:12px">${title}</h3>
      ${rows.map(r=>`
        <div class="quick-line">
          <div>${r.min !== undefined ? `Dès ${r.min} m²` : `Dès ${r.minHeight} m`}</div>
          <div style="font-weight:700">${num(r.rate).toFixed(2).replace(".",",")} €/${unit}</div>
        </div>
      `).join("")}
    </div>
  `;
}
function coeffGroup(title, data, section, category){
  return `
    <div class="group-card">
      <h4>${title}</h4>
      ${Object.entries(data).map(([label,value])=>`
        <div class="edit-line">
          <div style="font-size:14px;color:#334155">${label}</div>
          <input type="number" step="0.01" value="${value}" oninput="updateNestedParams('${section}','${category}','${escapeAttr(label)}', this.value)">
        </div>
      `).join("")}
    </div>
  `;
}
function constGroup(title, data, section){
  return `
    <div class="group-card">
      <h4>${title}</h4>
      ${Object.entries(data).map(([label,value])=>`
        <div class="edit-line">
          <div style="font-size:14px;color:#334155">${label}</div>
          <input type="number" step="0.01" value="${value}" oninput="updateConstParams('${section}','${label}', this.value)">
        </div>
      `).join("")}
    </div>
  `;
}
function rateEditor(title, rows, sectionKey, fields){
  const cols = fields.length===3 ? "" : " two";
  return `
    <div class="group-card" style="grid-column:1/-1">
      <h4>${title}</h4>
      ${rows.map((row,index)=>`
        <div class="rate-row">
          <div class="rate-grid${cols}">
            ${fields.map(field=>`
              <div>
                <div class="small-label">${field.label}</div>
                <input type="${field.type}" step="${field.step||"1"}" value="${row[field.key]}" oninput="updateRateTable('${sectionKey}',${index},'${field.key}',this.value)">
              </div>
            `).join("")}
          </div>
        </div>
      `).join("")}
    </div>
  `;
}
